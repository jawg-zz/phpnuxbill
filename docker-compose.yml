version: "3.8"

services:
  nuxbill:
    pull_policy: always
    build:
      context: ./
      target: development
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    environment:
      TZ: Africa/Nairobi
      UNIT_WEBROOT: /var/www/html
    volumes:
      - uploads:/var/www/html/system/uploads
      - config:/var/www/html/config
    network_mode: "container:wg-easy-h8occw0w08w0o044cs8o8ks4"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads:
  config:
