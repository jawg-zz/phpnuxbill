services:
  nuxbill:
    pull_policy: always
    build: ./
    environment:
      TZ: Africa/Nairobi
    ports:
      - '10.8.0.2:8728:8728'
    volumes:
      - uploads:/var/www/html/system/uploads
      - config:/var/www/html/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
