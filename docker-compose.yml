services:
  nuxbill:
    pull_policy: always
    build: ./
    environment:
      TZ: Africa/Nairobi
    volumes:
      - uploads:/var/www/html/system/uploads
      - type: bind
        source: ./config.php
        target: /var/www/html/config.php
        content: ""

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
