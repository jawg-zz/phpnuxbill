services:
  nuxbill:
    pull_policy: always
    build: ./
    environment:
      TZ: Africa/Nairobi
    ports:
      - 8188:8188
    volumes:
      - uploads:/var/www/html/system/uploads
      - config:/var/www/html/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    network_mode: "container:wg-easy-f0c4wcw4ckko448kcgkkgk88"
