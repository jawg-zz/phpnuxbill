services:
  nuxbill:
    pull_policy: always
    build: ./
    environment:
      TZ: Africa/Nairobi
    volumes:
      - uploads:/var/www/html/system/uploads
      - config:/var/www/html/config
    network_mode: "container:gluetun-pww8sg80gosg4s4skkk8go4g"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8282/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
