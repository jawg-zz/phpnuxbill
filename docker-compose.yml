services:
  nuxbill:
    pull_policy: always
    build: ./
    environment:
      TZ: Africa/Nairobi
    volumes:
      - ./data/uploads:/var/www/html/system/uploads
      - ./data/config.php:/var/www/html/config.php
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
